line-length = 110
target-version = "py311"

[lint]
# E - pycodestyle errors
# F - pyflakes
# I - isort
# UP - pyupgrade (dataclasses, typing)
# B - flake8-bugbear (basic bug patterns)
select = ["E", "F", "I", "UP", "B"]
ignore = [
    "E501",  # длина строк — пусть форматтер решает
    "B008",  # FastAPI `Depends()` в дефолтах — паттерн фреймворка
    "UP007", # `X | None` vs `Optional[X]` — оба ok
]

[lint.per-file-ignores]
"app/models/base.py" = ["F401"]  # реэкспорт типов
"**/__init__.py" = ["F401"]
