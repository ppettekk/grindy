# Production-стек: postgres + backend + bot + caddy + статический фронт + лендинг.
#
# Запуск:
#   docker compose -f docker-compose.prod.yml down
#   docker volume rm grindy_frontend_dist
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Caddy использует Cloudflare Origin Certificate из /etc/caddy/cf/

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips=*
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  bot:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      RUN_SCHEDULER: "false"
    command: python -m bot.main
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started

  frontend-build:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE: ""
    volumes:
      - frontend_dist:/srv

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend_dist:/srv/app:ro
      - ./landing:/srv/landing:ro
      # Cloudflare Origin Certificate
      - /etc/caddy/cf:/etc/caddy/cf:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend-build

  avito-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.avito
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      RUN_SCHEDULER: "false"
    command: python -m app.avito_worker
    # Chromium прожорлив — ограничиваем, чтобы не сожрал весь VPS.
    mem_limit: 900m
    # shm нужен Chromium; без увеличения падает на сложных страницах.
    shm_size: 512m
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started

  db-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_EXTRA_OPTS: "-Fc"
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
      TZ: Europe/Moscow
    volumes:
      - ./backups:/backups

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  frontend_dist:
