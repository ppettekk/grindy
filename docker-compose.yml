services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-grindy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grindy}
      POSTGRES_DB: ${POSTGRES_DB:-grindy}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grindy}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-grindy}:${POSTGRES_PASSWORD:-grindy}@db:5432/${POSTGRES_DB:-grindy}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  bot:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-grindy}:${POSTGRES_PASSWORD:-grindy}@db:5432/${POSTGRES_DB:-grindy}
    command: python -m bot.main
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: http://localhost:8000
    command: npm run dev -- --host 0.0.0.0

  # ── Бэкап БД ────────────────────────────────────────────────────
  # Каждый день в 03:00 делает pg_dump (формат custom -Fc, gzip уровня 9).
  # Ротация: 7 дневных + 4 недельных + 6 месячных. Хранение — только на VPS.
  # Бэкапы лежат в ./backups/ — этот путь смонтирован на хост.
  db-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-grindy}
      POSTGRES_USER: ${POSTGRES_USER:-grindy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grindy}
      POSTGRES_EXTRA_OPTS: "-Fc"
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
      TZ: Europe/Moscow
    volumes:
      - ./backups:/backups

volumes:
  pgdata:
